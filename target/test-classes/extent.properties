# Extent Reports output path
extent.reporter.spark.start=true
extent.reporter.spark.out=target/extent-reports/ExtentReport.html

# Report title and name
extent.reporter.spark.config.report.name=ParaBank Test Report
extent.reporter.spark.config.report.title=ParaBank Automation Results

# Theme: dark or standard
extent.reporter.spark.config.theme=dark

# Attach screenshots inline on failure
extent.reporter.spark.config.encoding=UTF-8
extent.reporter.spark.config.offlineMode=true
